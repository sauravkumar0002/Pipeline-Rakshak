version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corrosion_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist uploads and the SQLite database outside the container
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./corrosion_detection.db:/app/corrosion_detection.db
      - ./backend/datasets:/app/backend/datasets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: corrosion_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  uploads:
  reports:
